# glossary/investment.yaml
domain: 投资
terms:
  - term: PE比
    description: 市盈率，Price-to-Earnings Ratio
  - term: PB比
    description: 市净率，Price-to-Book Ratio
  - term: ROE
    description: 净资产收益率，Return on Equity
  - term: 底背离
    description: 价格创新低但指标未创新低的技术形态
  - term: 顶背离
    description: 价格创新高但指标未创新高的技术形态
  - term: 满仓
    description: 将全部资金投入持仓
  - term: 半仓
    description: 将一半资金投入持仓
  - term: 止损
    description: 设定亏损上限，达到后卖出以控制风险
  - term: 止盈
    description: 设定盈利目标，达到后卖出以锁定利润
  - term: 做多
    description: 买入资产，预期价格上涨后获利
  - term: 做空
    description: 借入资产卖出，预期价格下跌后买回获利
  - term: 均线
    description: 移动平均线，Moving Average
  - term: K线
    description: 蜡烛图，显示开盘价、收盘价、最高价、最低价
  - term: 涨停
    description: 股价达到当日最大涨幅限制
  - term: 跌停
    description: 股价达到当日最大跌幅限制
  - term: 大阳线
    description: 开盘价接近最低价，收盘价接近最高价，实体很长、涨幅大，代表多头强势上涨
  - term: 大阳
    description: 开盘价接近最低价，收盘价接近最高价，实体很长、涨幅大，代表多头强势上涨
  - term: 大阴线
    description: 开盘价接近最高价，收盘价接近最低价，实体很长、跌幅大，代表空头强势下跌
  - term: 大阴
    description: 开盘价接近最高价，收盘价接近最低价，实体很长、跌幅大，代表空头强势下跌
  - term: 妖股
    description: 指短期暴涨暴跌、脱离基本面、走势独立、由游资炒作的股票，行情疯狂但风险极高。常被误识别为"腰骨""腰果"
  - term: 换手率
    description: 一定时间内市场中股票转手买卖的频率，反映股票流通性强弱，计算公式为（成交量/流通股本）×100%
  - term: 量比
    description: 衡量相对成交量的指标，指当前每分钟成交量与过去5日每分钟平均成交量的比值，反映成交量异动程度
  - term: 委比
    description: 衡量某一时段买卖盘相对强度的指标，计算公式为（委买手数 - 委卖手数）÷（委买手数 + 委卖手数）×100%
  - term: 委差
    description: 委买手数与委卖手数的差值，正数代表买盘力量较强，负数代表卖盘力量较强
  - term: 流通盘
    description: 上市公司已发行股份中可以在证券市场上自由交易的股份数量（不含限售股）
  - term: 总市值
    description: 上市公司全部股份按当前市场价格计算的总价值，计算公式为总股数×股价
  - term: 流通市值
    description: 上市公司流通股份按当前市场价格计算的总价值，计算公式为流通股数×股价
  - term: 高抛低吸
    description: 股票投资的一种操作策略，在股价高位时卖出，低位时买入，赚取差价收益
  - term: 仓位
    description: 投资者实际持有股票的资金占其可用于投资总资金的比例（如满仓、半仓、三成仓）
  - term: 建仓
    description: 投资者开始买入某只或多只股票，建立持仓头寸的行为
  - term: 加仓
    description: 在已有持仓的基础上，继续买入同一股票以增加持仓数量的行为
  - term: 减仓
    description: 在已有持仓的基础上，卖出部分股票以减少持仓数量的行为
  - term: 清仓
    description: 将所持有的某只或全部股票全部卖出，清空持仓的行为
  - term: 套牢
    description: 投资者买入股票后，股价持续下跌，导致卖出股票会产生亏损，只能被动持有等待反弹的状态
  - term: 解套
    description: 被套牢的股票，在股价反弹至投资者买入成本价或以上时，卖出股票摆脱亏损的状态
  - term: 割肉
    description: 投资者为避免股价继续下跌造成更大亏损，在亏损状态下强行卖出股票的行为
  - term: 横盘
    description: 股价在一段时间内波动幅度很小，维持在一个相对稳定的价格区间内运行的走势
  - term: 震荡
    description: 股价在一定区间内上下波动、反复涨跌的走势，无明显的单边上涨或下跌趋势
  - term: 牛市
    description: 也称多头市场，指证券市场整体呈现长期持续上涨的行情，市场情绪乐观，赚钱效应明显
  - term: 熊市
    description: 也称空头市场，指证券市场整体呈现长期持续下跌的行情，市场情绪悲观，亏钱效应明显
  - term: 猴市
    description: 指股市行情波动剧烈、涨跌幅大、走势反复无常，既无明确的牛市特征，也无明确的熊市特征
  - term: 反弹
    description: 股价在持续下跌过程中出现的短暂上涨行情，属于下跌趋势中的阶段性修复
  - term: 反转
    description: 股价趋势发生根本性改变，如从持续下跌转为持续上涨（底部反转），或从持续上涨转为持续下跌（顶部反转）
  - term: 跳空高开
    description: 股票开盘价高于前一交易日收盘价，且两个价格之间形成没有成交的空白区间
  - term: 跳空低开
    description: 股票开盘价低于前一交易日收盘价，且两个价格之间形成没有成交的空白区间
  - term: 缺口
    description: 股价快速变动时形成的没有成交的价格区间，分为跳空高开缺口、跳空低开缺口，缺口通常有支撑或压力作用
  - term: 支撑位
    description: 股价下跌到某一价格位置时，买盘力量增加，阻止股价继续下跌的价格区间（跌破后可能转为压力位）
  - term: 压力位
    description: 股价上涨到某一价格位置时，卖盘力量增加，阻止股价继续上涨的价格区间（突破后可能转为支撑位）
  - term: 主力资金
    description: 指能够影响股价走势的大额资金，通常来自机构、游资等，其买入或卖出行为对股价影响显著
  - term: 北向资金
    description: 通过沪股通、深股通从香港市场流入A股市场的资金，因其资金规模和动向受市场关注，常被视为外资风向标
  - term: 南向资金
    description: 通过港股通从A股市场流入香港市场的资金
  - term: 利好
    description: 有利于股价上涨的消息或因素（如公司业绩增长、政策扶持、行业景气度提升等）
  - term: 利空
    description: 不利于股价上涨的消息或因素（如公司业绩亏损、政策打压、行业衰退等）
  - term: 利好出尽
    description: 指利好消息公布后，市场提前消化该利好，股价不仅不涨反而下跌的现象
  - term: 利空出尽
    description: 指利空消息公布后，市场风险充分释放，股价不再下跌甚至开始反弹的现象
  - term: 除权
    description: 上市公司实施分红、送股、转增股本等方案后，对股价进行调整，使股价反映权益变化的行为
  - term: 除息
    description: 上市公司实施现金分红后，从股价中扣除分红金额的行为，除息后股价会相应下调
  - term: 填权
    description: 股票除权后，股价从除权价开始上涨，逐步涨回除权前的价格水平的过程
  - term: 贴权
    description: 股票除权后，股价从除权价开始下跌，低于除权价的状态
  - term: 蓝筹股
    description: 指经营业绩稳定、规模较大、行业地位领先、分红稳定的上市公司股票（如金融、能源、消费龙头企业）
  - term: 成长股
    description: 指处于快速发展阶段、业绩增长潜力大的上市公司股票，通常市盈率较高，股价波动相对较大
  - term: 题材股
    description: 指具有某种特殊概念（如政策利好、技术突破、资产重组等），受市场资金炒作的股票
  - term: 绩优股
    description: 指业绩优良、盈利能力强、财务状况健康的上市公司股票
  - term: 垃圾股
    description: 指业绩亏损、经营状况差、财务风险高的上市公司股票，常依赖题材炒作，风险极高
  - term: 打新
    description: 投资者参与新股申购的行为，期望以发行价买入新股，在上市后卖出赚取差价
  - term: 破发
    description: 新股上市后，股价跌破发行价的现象
  - term: 停牌
    description: 上市公司因重大事项（如资产重组、业绩披露、澄清公告等），暂时停止其股票在证券市场交易的行为
  - term: 复牌
    description: 上市公司停牌事项处理完毕后，恢复其股票在证券市场交易的行为
  - term: 融资融券
    description: 简称两融，融资是投资者向券商借钱买股票（做多），融券是投资者向券商借股票卖出（做空），均需支付利息
  - term: 杠杆
    description: 投资者通过借入资金（如融资、配资）扩大投资规模，放大收益和风险的行为
  - term: 龙虎榜
    description: 证券交易所公布的每日异动股票的交易信息，包含买卖席位（游资、机构）、成交金额等，反映资金动向
  - term: 量价齐升
    description: 股价上涨的同时，成交量同步放大，是健康的上涨信号，代表买盘力量充足
  - term: 量价背离
    description: 股价与成交量走势不一致的现象（如股价上涨但成交量萎缩，或股价下跌但成交量放大），提示趋势可能反转
  - term: 追涨杀跌
    description: 投资者的非理性操作行为，股价上涨时盲目买入（追涨），股价下跌时盲目卖出（杀跌），容易造成亏损
  - term: 抄底
    description: 投资者在股价下跌至认为的底部区域时，买入股票期望博取反弹收益的行为
  - term: 逃顶
    description: 投资者在股价上涨至认为的顶部区域时，卖出股票锁定收益的行为
  - term: 盘口
    description: 指股票交易过程中，实时的买卖盘数据、成交量、成交价等信息，反映盘中交易动态
  - term: 做T
    description: 利用股价当日波动，在持有底仓的基础上，低买高卖（或高卖低买）赚取差价的短线操作策略（如正T、反T）
  - term: 均线多头排列
    description: 短期均线（如5日线）在中期均线（如10日线）上方，中期均线在长期均线（如20日线）上方，代表多头趋势强劲
  - term: 均线空头排列
    description: 短期均线在中期均线下方，中期均线在长期均线下方，代表空头趋势强劲
  - term: 金叉
    description: 短期均线向上穿越中长期均线（如5日线金叉10日线），或技术指标（如MACD）的快线向上穿越慢线，视为买入信号
  - term: 死叉
    description: 短期均线向下穿越中长期均线，或技术指标的快线向下穿越慢线，视为卖出信号
  - term: MACD
    description: 指数平滑异同移动平均线，常用的技术分析指标，通过短期和长期均线的差值判断多空动能和趋势
  - term: KDJ
    description: 随机指标，常用的技术分析指标，通过股价近期波动的最高价、最低价和收盘价计算，判断超买超卖和趋势反转
  - term: RSI
    description: 相对强弱指标，衡量股价上涨和下跌力度的指标，取值范围0-100，通常70以上为超买，30以下为超卖
  - term: 布林带
    description: 布林通道，由中轨（均线）、上轨（中轨+标准差）、下轨（中轨-标准差）组成，判断股价波动范围和趋势